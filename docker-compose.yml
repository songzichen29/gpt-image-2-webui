services:
  gpt-image-2-webui:
    build:
      context: .
      args:
        NEXT_PUBLIC_IMAGE_STORAGE_MODE: ${NEXT_PUBLIC_IMAGE_STORAGE_MODE:-fs}
    image: gpt-image-2-webui:latest
    container_name: gpt-image-2-webui
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.774966.xyz/v1}
      NEXT_PUBLIC_IMAGE_STORAGE_MODE: ${NEXT_PUBLIC_IMAGE_STORAGE_MODE:-fs}
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - ./generated-images:/app/generated-images
