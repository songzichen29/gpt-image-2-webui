services:
  gpt-image-2-webui:
    image: tannic666/gpt-image-2-webui:latest
    container_name: gpt-image-2-webui
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-}
      OPENAI_IMAGE_TIMEOUT_MS: ${OPENAI_IMAGE_TIMEOUT_MS:-1200000}
      NEXT_PUBLIC_IMAGE_STORAGE_MODE: ${NEXT_PUBLIC_IMAGE_STORAGE_MODE:-minio}
      MINIO_SERVER_URL: ${MINIO_SERVER_URL:-}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-}
      MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-gpt-image-2-webui}
      APP_PASSWORD: ${APP_PASSWORD:-}
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-}
      SUB2API_LOGIN_URL: ${SUB2API_LOGIN_URL:-}
      SUB2API_IMAGE2_ENTRY_URL: ${SUB2API_IMAGE2_ENTRY_URL:-}
      IMAGE2_SESSION_SECRET: ${IMAGE2_SESSION_SECRET:-}
      IMAGE2_COOKIE_SAMESITE: ${IMAGE2_COOKIE_SAMESITE:-lax}
      IMAGE2_COOKIE_SECURE: ${IMAGE2_COOKIE_SECURE:-}
    volumes:
      - ./generated-images:/app/generated-images
